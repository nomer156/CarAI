<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#12161a" />
    <meta
      name="description"
      content="CodexCar — цифровой сервисный паспорт автомобиля с деталями, регламентом и подтвержденной историей обслуживания."
    />
    <link rel="icon" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>CodexCar</title>
    <script>
      (() => {
        const savedTheme = window.localStorage.getItem('codexcar-theme');
        const theme =
          savedTheme === 'light' || savedTheme === 'dark'
            ? savedTheme
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.dataset.theme = theme;
        const themeColor = theme === 'dark' ? '#10202b' : '#fff9f4';
        document.querySelector('meta[name="theme-color"]')?.setAttribute('content', themeColor);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
